[package]
name = "keycord"
description = "Browse and edit password stores"
authors = ["noobping"]
version = "0.9.5"
edition = "2021"
license = "GPL-3.0-only"
homepage = "https://github.com/noobping/keycord"
repository = "https://github.com/noobping/keycord"

[features]
setup = []
flatpak = []

[dependencies]
thiserror = "2.0"
adw = { version = "0.9.0", package = "libadwaita", features = ["v1_5"] }
walkdir = "2.5.0"
toml = "1.1.0"
serde = { version = "1.0.228", features = ["derive"] }
ripasso = "0.8.0"
sequoia-openpgp = "2.2.0"
dirs-next = "2.0.0"
shellexpand = "3.1.1"
totp-rs = "5.7.0"
rand = "0.10.0"
regex = "1.12.2"
zeroize = { version = "1.8.1", features = ["alloc"] }
pulldown-cmark = "0.13.0"
fido2-rs = { version = "0.4.0" }
base64 = "0.22.1"
hmac = "0.12.1"
openssl = "0.10.76"
sha2 = "0.10.9"

[target.'cfg(target_os = "linux")'.dependencies]
anyhow = "1.0"
libc = "0.2"
shlex = "1.3.0"
card-backend-pcsc = "0.5.1"
openpgp-card = "0.6.1"
secrecy = "0.10.3"

[build-dependencies]
glib-build-tools = "0.22.0"

[target.'cfg(target_os = "windows")'.build-dependencies]
winresource = "0.1.31"

[target.'cfg(target_os = "windows")'.dependencies]
semver = "1.0.27"
reqwest = { version = "0.12.24", default-features = false, features = ["blocking", "json", "rustls-tls"] }
winsafe = { version = "0.0.25", features = ["shell"] }
