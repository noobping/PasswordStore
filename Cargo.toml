[package]
name = "passwordstore"
description = "A modern Rust-based password manager for Linux, built with GTK4/Libadwaita"
authors = ["noobping"]
version = "0.1.2"
edition = "2021"

[features]
setup = ["ripasso"]
flatpak = ["ripasso", "sequoia-openpgp"]

[dependencies]
anyhow = "^1.0"
thiserror = "^2.0"
adw = { version = "^0.8.0", package = "libadwaita", features = ["v1_5"] }
walkdir = "^2.5.0"
toml = "^0.9.8"
serde = { version = "^1.0.228", features = ["derive"] }
ripasso = { version = "^0.8.0", optional = true }
sequoia-openpgp = { version = "^2.1.0", optional = true }
dirs-next = "2.0.0"
libc = "^0.2"
shlex = "^1.3.0"
shellexpand = "^3.1.1"
totp-rs = "^5.7.0"

[build-dependencies]
glib-build-tools = "^0.21.0"
