<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Keycord app icon</title>
  <desc>GNOME-style full-color app icon for an app named Keycord. A keyboard key with a cord motif.</desc>

  <!-- Cord shadow-free back loop -->
  <path d="M86 26
           C99 26 108 35 108 48
           C108 60 100 68 88 70"
        stroke="#9141AC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cord entering the key -->
  <path d="M88 70
           C82 72 78 76 78 82
           V88"
        stroke="#613583" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Key front/profile -->
  <path d="M28 48
           H82
           C90.837 48 98 55.163 98 64
           V86
           C98 94.837 90.837 102 82 102
           H28
           C19.163 102 12 94.837 12 86
           V64
           C12 55.163 19.163 48 28 48Z"
        fill="#1A5FB4"/>

  <!-- Key top surface -->
  <path d="M28 26
           H82
           C90.837 26 98 33.163 98 42
           V70
           C98 78.837 90.837 86 82 86
           H28
           C19.163 86 12 78.837 12 70
           V42
           C12 33.163 19.163 26 28 26Z"
        fill="#62A0EA"/>

  <!-- Subtle split line between top and front -->
  <path d="M12 70
           C12 78.837 19.163 86 28 86
           H82
           C90.837 86 98 78.837 98 70"
        stroke="#3584E4" stroke-width="2" stroke-linecap="round"/>

  <!-- Inner key legend groove -->
  <path d="M34 39
           H74
           C79.523 39 84 43.477 84 49
           V56"
        stroke="#99C1F1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main K-like cord mark -->
  <path d="M39 46V67"
        stroke="#F8E45C" stroke-width="8" stroke-linecap="round"/>
  <path d="M59 46
           L45 58
           L61 67"
        stroke="#F6D32D" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cord plug head -->
  <rect x="82" y="15" width="16" height="14" rx="4" fill="#C061CB"/>
  <rect x="86" y="10" width="3" height="8" rx="1.5" fill="#C061CB"/>
  <rect x="92" y="10" width="3" height="8" rx="1.5" fill="#C061CB"/>
</svg>
