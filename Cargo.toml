[package]
name = "keycord"
description = "Browse and edit password stores"
authors = ["noobping"]
version = "0.8.0"
edition = "2021"

[features]
setup = []
flatpak = ["sequoia-openpgp"]

[dependencies]
anyhow = "^1.0"
thiserror = "^2.0"
adw = { version = "^0.8.0", package = "libadwaita", features = ["v1_5"] }
walkdir = "^2.5.0"
toml = "^1.0.6"
serde = { version = "^1.0.228", features = ["derive"] }
ripasso = "^0.8.0"
sequoia-openpgp = { version = "^2.1.0", optional = true }
dirs-next = "2.0.0"
shlex = "^1.3.0"
shellexpand = "^3.1.1"
totp-rs = "^5.7.0"
rand = "^0.10.0"

[build-dependencies]
glib-build-tools = "^0.22.0"

[dev-dependencies]
sequoia-openpgp = "^2.1.0"
