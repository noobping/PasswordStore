id: io.github.noobping.keycord
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.llvm20

command: keycord

finish-args:
  - --device=dri
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland

modules:
  - name: keycord
    buildsystem: simple

    build-options:
      prepend-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CLANG_PATH: /usr/lib/sdk/llvm20/bin/clang
        CARGO_HOME: /run/build/keycord/cargo
        LIBCLANG_PATH: /usr/lib/sdk/llvm20/lib
        BINDGEN_EXTRA_CLANG_ARGS: -resource-dir=/usr/lib/sdk/llvm20/lib/clang/20

    build-commands:
      - cargo build --release --features flatpak
      - install -Dm0755 target/release/keycord /app/bin/keycord
      - install -Dm0644 data/scalable/apps/${FLATPAK_ID}.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      - install -Dm0644 keycord.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm0644 screenshots/list.png /app/share/metainfo/${FLATPAK_ID}.list.png
      - install -Dm0644 screenshots/file.png /app/share/metainfo/${FLATPAK_ID}.screenshot2.png
      - install -Dm0644 screenshots/preferences1.png /app/share/metainfo/${FLATPAK_ID}.preferences1.png
      - install -Dm0644 data/gschema.xml /app/share/glib-2.0/schemas/${FLATPAK_ID}.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas
      - install -Dm0644 data/metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml

    sources:
      - type: git
        url: https://github.com/noobping/keycord.git
        commit: dbde4d77a08c5792e1226520328244423a5760ef
      - type: file
        path: cargo-sources.yml
      - cargo-sources.yml
