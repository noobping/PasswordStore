version: 1

# Build the release binary before running appimage-builder:
# cargo build --release
script:
  - rm -rf AppDir
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/glib-2.0/schemas
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
  - mkdir -p AppDir/usr/share/metainfo
  - test -x target/release/keycord
  - install -Dm0755 target/release/keycord AppDir/usr/bin/keycord
  - install -Dm0644 data/256x256/apps/io.github.noobping.keycord.png AppDir/usr/share/icons/hicolor/256x256/apps/io.github.noobping.keycord.png
  - install -Dm0644 data/scalable/apps/io.github.noobping.keycord.svg AppDir/usr/share/icons/hicolor/scalable/apps/io.github.noobping.keycord.svg
  - install -Dm0644 data/gschema.xml AppDir/usr/share/glib-2.0/schemas/io.github.noobping.keycord.gschema.xml
  - install -Dm0644 data/metainfo.xml AppDir/usr/share/metainfo/io.github.noobping.keycord.metainfo.xml
  - |
    cat > AppDir/usr/share/applications/io.github.noobping.keycord.desktop <<'EOF'
    [Desktop Entry]
    Type=Application
    Version=1.0
    Name=Keycord
    Comment=Browse and edit password stores
    Exec=keycord
    Icon=io.github.noobping.keycord
    Terminal=false
    Categories=Utility;Security;
    StartupNotify=true
    EOF

AppDir:
  path: ./AppDir

  app_info:
    id: io.github.noobping.keycord
    name: Keycord
    icon: io.github.noobping.keycord
    version: "0.8.0"
    exec: usr/bin/keycord
    exec_args: "$@"

  files:
    exclude:
      - usr/share/doc/*
      - usr/share/info/*
      - usr/share/lintian/*
      - usr/share/man/*
      - var/cache/apt/*

  runtime:
    env:
      PATH: "${APPDIR}/usr/bin:${PATH}"
      XDG_DATA_DIRS: "${APPDIR}/usr/share:${XDG_DATA_DIRS}"
      GIT_EXEC_PATH: "${APPDIR}/usr/lib/git-core"
      GSETTINGS_SCHEMA_DIR: "${APPDIR}/usr/share/glib-2.0/schemas"
      SSL_CERT_FILE: "${APPDIR}/etc/ssl/certs/ca-certificates.crt"
      GIT_SSL_CAINFO: "${APPDIR}/etc/ssl/certs/ca-certificates.crt"

  apt:
    arch: amd64
    sources:
      - sourceline: "deb [arch=amd64] http://deb.debian.org/debian trixie main"
        key_url: "https://ftp-master.debian.org/keys/archive-key-13.asc"
    include:
      - ca-certificates
      - dconf-gsettings-backend
      - git
      - gnupg
      - gpg-agent
      - libadwaita-1-0
      - libcurl4t64
      - libgpgme11t64
      - libgtk-4-1
      - librsvg2-common
      - libssl3t64
      - oathtool
      - openssh-client
      - pass
      - pass-otp
      - pinentry-gnome3

AppImage:
  arch: x86_64
  update-information: "gh-releases-zsync|noobping|keycord|latest|*x86_64.AppImage.zsync"
