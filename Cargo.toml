[package]
name = "keycord"
description = "Browse and edit password stores"
authors = ["noobping"]
version = "0.9.2"
edition = "2021"
license = "GPL-3.0-only"
homepage = "https://github.com/noobping/keycord"
repository = "https://github.com/noobping/keycord"

[features]
setup = []
flatpak = []

[dependencies]
anyhow = "1.0"
thiserror = "2.0"
adw = { version = "0.9.0", package = "libadwaita", features = ["v1_5"] }
walkdir = "2.5.0"
toml = "1.1.0"
serde = { version = "1.0.228", features = ["derive"] }
ripasso = "0.8.0"
sequoia-openpgp = "2.2.0"
dirs-next = "2.0.0"
shlex = "1.3.0"
shellexpand = "3.1.1"
totp-rs = "5.7.0"
rand = "0.10.0"
regex = "1.12.2"
card-backend-pcsc = "0.5.1"
openpgp-card = "0.6.1"
secrecy = "0.10.3"
zeroize = { version = "1.8.1", features = ["alloc"] }

[build-dependencies]
glib-build-tools = "0.22.0"
